name: BRVM Daily Update

on:
  # Déclenchement automatique : 19h30 Abidjan (= UTC+0) → lun-ven
  schedule:
    - cron: "30 19 * * 1-5"

  # Déclenchement MANUEL depuis l'interface GitHub (bouton "Run workflow")
  workflow_dispatch:
    inputs:
      date_override:
        description: "Date à forcer (YYYY-MM-DD) — laisser vide pour aujourd'hui"
        required: false
        default: ""

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run BRVM updater
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python brvm_update.py

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ BRVM update failed on $(date)"
          echo "Check the logs above for details."
