name: BRVM Daily Update

on:
  # Passage 1 : 18h30 UTC = 18h30 Abidjan – PDF généralement publié à cette heure
  # Passage 2 : 23h30 UTC = 23h30 Abidjan – Filet de sécurité si PDF publié tard
  schedule:
    - cron: "30 18 * * 1-5"   # lun-ven 18h30 UTC
    - cron: "30 23 * * 1-5"   # lun-ven 23h30 UTC

  workflow_dispatch:
    inputs:
      date_override:
        description: "Date à forcer (YYYY-MM-DD) — laisser vide pour aujourd'hui"
        required: false
        default: ""

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run BRVM updater
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          DATE_OVERRIDE: ${{ github.event.inputs.date_override }}
        run: python brvm_update.py

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ BRVM update failed on $(date)"
          echo "Check the logs above for details."
