name: BRVM Daily Update

on:
  schedule:
    - cron: "30 18 * * 1-5"
    - cron: "30 23 * * 1-5"

  workflow_dispatch:
    inputs:
      date_override:
        description: "Date a forcer (YYYY-MM-DD)"
        required: false
        default: ""

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run BRVM updater
        id: scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          DATE_OVERRIDE: ${{ github.event.inputs.date_override }}
        run: python brvm_update.py

      - name: Ouvrir une issue si echec
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const date = new Date().toISOString().slice(0, 10);
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Scraper BRVM echoue - ${date}`,
              body: `Le scraper na pas pu recuperer les donnees du **${date}**.\n\n**Logs :** ${runUrl}\n\n> Relancer via Actions - BRVM Daily Update - Run workflow avec la date.`,
              labels: ['bug']
            });
