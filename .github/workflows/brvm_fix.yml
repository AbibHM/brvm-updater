name: Fix brvm_update
on:
  workflow_dispatch:
jobs:
  fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Move if __name__ to end of file
        shell: python
        run: |
          content = open('brvm_update.py', encoding='utf-8').read()
          # Remove the if __name__ block from its current position (line 727)
          IF_BLOCK = '\nif __name__ == "__main__":\n    main()\n'
          count = content.count(IF_BLOCK)
          print(f'Found {count} occurrence(s) of if __name__ block')
          # Remove all occurrences
          clean = content.replace(IF_BLOCK, '\n')
          # Add it at the very end
          clean = clean.rstrip() + '\n\n\nif __name__ == "__main__":\n    main()\n'
          open('brvm_update.py', 'w', encoding='utf-8').write(clean)
          # Verify
          result = open('brvm_update.py').read()
          lines = result.split('\n')
          last_if = max(i for i, l in enumerate(lines) if 'if __name__' in l)
          last_def = max(i for i, l in enumerate(lines) if l.startswith('def '))
          print(f'Lines: {len(lines)} | last def: {last_def+1} | last if __name__: {last_if+1}')
          assert last_if > last_def, f'if __name__ ({last_if+1}) must be after last def ({last_def+1})'
          print('OK - if __name__ is after all functions')

      - name: Commit and push
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add brvm_update.py
          git commit -m "fix: deplacer if __name__ apres toutes les fonctions"
          git push
