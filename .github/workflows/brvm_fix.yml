name: Fix brvm_update
on:
  workflow_dispatch:
jobs:
  fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Clean brvm_update.py
        shell: python
        run: |
          lines = open('brvm_update.py', encoding='utf-8').readlines()
          print(f'Original: {len(lines)} lines')
          part1 = lines[0:718]
          part2 = lines[719:1072]
          install = [
              '\n', '\n',
              'def install_deps():\n',
              '    \"\"\"Installer pdfplumber si absent.\"\"\"\n',
              '    try:\n',
              '        import pdfplumber\n',
              '    except ImportError:\n',
              '        import subprocess\n',
              '        subprocess.run(["pip", "install", "pdfplumber", "--quiet"], check=True)\n',
              '\n',
          ]
          idx = next(i for i, l in enumerate(part1) if l.strip() == 'def main():')
          final = part1[:idx] + install + part1[idx:] + ['\n'] + part2
          open('brvm_update.py', 'w', encoding='utf-8').writelines(final)
          c = open('brvm_update.py').read()
          assert c.count('\ndef main():') == 1
          assert c.count('\ndef install_deps():') == 1
          assert c.count('if __name__') == 1
          print(f'Fixed: {len(final)} lines - OK')

      - name: Commit
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git status
          git commit -a -m "fix: nettoyer brvm_update.py - supprimer doublons" || echo "Nothing to commit"
          git status           git commit -a -m "fix: nettoyer brvm_update.py - supprimer doublons" || echo "Nothing to commit"           git push || echo "Nothing to push"
