name: Fix brvm_update
on:
  workflow_dispatch:
jobs:
  fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fix open/close calculation
        shell: python
        run: |
          content = open('brvm_update.py', encoding='utf-8').read()
          OLD = (
              '        # Structure colonnes: Symbole|Nom|Volume|Cours_veille|Cours_ouverture|Cours_cloture|Variation\n'
              '        cours_veille    = to_float(tds[3]) if len(tds) > 3 else None\n'
              '        cours_ouverture = to_float(tds[4]) if len(tds) > 4 else None\n'
              '        cours_cloture   = to_float(tds[5]) if len(tds) > 5 else None\n'
              '        open_  = cours_ouverture if cours_ouverture and cours_ouverture > 0 else (cours_veille or price_nums[0])\n'
              '        close  = cours_cloture   if cours_cloture   and cours_cloture   > 0 else (cours_ouverture or price_nums[-1])'
          )
          NEW = (
              '        # Colonnes: Symbole|Nom|Volume|Cours_veille|Cours_ouverture|Cours_cloture|Variation\n'
              '        # cours_veille = dernier cours officiel confirme (reference fiable)\n'
              '        # cours_cloture = cours du jour, = cours_veille si seance pas terminee\n'
              '        cours_veille    = to_float(tds[3]) if len(tds) > 3 else None\n'
              '        cours_ouverture = to_float(tds[4]) if len(tds) > 4 else None\n'
              '        cours_cloture   = to_float(tds[5]) if len(tds) > 5 else None\n'
              '        # close = cours_veille (fiable), sauf si seance terminee et cloture differente\n'
              '        seance_terminee = (cours_cloture and cours_cloture > 0 and cours_cloture != cours_veille)\n'
              '        open_  = cours_ouverture if cours_ouverture and cours_ouverture > 0 else cours_veille\n'
              '        close  = cours_cloture if seance_terminee else cours_veille'
          )
          if OLD not in content:
              print(f'ERROR: OLD pattern not found. File length: {len(content)}')
              exit(1)
          fixed = content.replace(OLD, NEW)
          open('brvm_update.py', 'w', encoding='utf-8').write(fixed)
          print(f'Fixed: {len(fixed)} chars - close logic updated')

      - name: Commit and push
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add brvm_update.py
          git commit -m "fix: close=cours_veille quand seance pas terminee pour variations correctes"
          git push
